# luna — CI (test) + auto-deploy lên VM qua SSH khi push main.
# Secrets cần đặt trong repo (Settings → Secrets and variables → Actions):
#   SSH_HOST     vd 152.67.199.77
#   SSH_USER     vd ubuntu
#   SSH_KEY      nội dung private key (file /Users/Shared/oracle/ssh-key-2026-06-05.key)
#   DEPLOY_PATH  vd /home/ubuntu/luna   (PHẢI là git clone — xem one-time setup bên dưới)
#
# One-time setup trên VM (đổi ~/luna rsync → git clone, public repo nên pull không cần auth):
#   cd ~ && mv luna luna.bak && git clone https://github.com/maivandangkhoa/lunabot.git luna
#   # secrets vẫn ở /etc/luna (không nằm trong repo) nên không ảnh hưởng.
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt
      - run: pytest -q

  deploy:
    needs: test
    runs-on: ubuntu-latest
    # chỉ deploy khi push thẳng main (không chạy cho PR)
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - name: Deploy qua SSH (git pull + rebuild)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch origin
            git reset --hard origin/main
            docker compose -f deploy/docker-compose.yml up -d --build
            docker image prune -f
